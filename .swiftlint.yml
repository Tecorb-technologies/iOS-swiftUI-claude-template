excluded:
  - .build
  - DerivedData
  - "*.xcodeproj"
  - Scripts

opt_in_rules:
  - sorted_imports
  - redundant_type_annotation
  - unneeded_parentheses_in_closure_argument
  - force_unwrapping # config below; force_unwrapping is opt-in so it must be listed here to take effect

analyzer_rules:
  - unused_import # only runs under `swiftlint analyze`, not `swiftlint lint`

disabled_rules:
  - explicit_self # SwiftFormat's `--self remove` strips explicit self instead of enforcing it

line_length:
  warning: 120
  error: 140
  ignores_urls: true
  ignores_comments: true

trailing_comma:
  mandatory_comma: true # match SwiftFormat's `--enable trailingCommas`, which adds them in multiline literals

force_unwrapping:
  severity: error

force_cast:
  severity: error

force_try:
  severity: error

identifier_name:
  min_length:
    warning: 2
  excluded:
    - id
    - url
    - x
    - y

type_name:
  min_length:
    warning: 3

custom_rules:
  explicit_self_disallowed:
    included: ".*\\.swift"
    regex: "\\bself\\.(?!init)"
    match_kinds:
      - identifier
    message: "Avoid explicit `self.` — SwiftFormat's `--self remove` should keep this out; only needed in escaping closures or initializer disambiguation."
    severity: warning
