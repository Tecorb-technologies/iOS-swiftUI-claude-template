name: Permission

options:
  bundleIdPrefix: com.tecorb
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

configs:
  Debug: debug
  Release: release

configFiles:
  Debug: Config/Debug.xcconfig
  Release: Config/Release.xcconfig

targets:
  Permission:
    type: application
    platform: iOS
    sources:
      - path: App
        excludes:
          - "**/README.md"
      - path: Features
        excludes:
          - "**/README.md"
      - path: Core
        excludes:
          - "**/README.md"
      - path: Resources
        excludes:
          - "**/README.md"
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Permission
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIAppFonts:
          - PlusJakartaSans-Regular.ttf
          - PlusJakartaSans-Medium.ttf
          - PlusJakartaSans-SemiBold.ttf
          - PlusJakartaSans-Bold.ttf
          - PlusJakartaSans-ExtraBold.ttf
          - PlusJakartaSans-Italic.ttf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tecorb.permission
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        SWIFT_STRICT_CONCURRENCY: complete

  PermissionTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/UnitTests
        excludes:
          - "**/README.md"
      - path: Tests/SnapshotTests
        excludes:
          - "**/README.md"
    dependencies:
      - target: Permission
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tecorb.permission.tests

  PermissionUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: UITests
        excludes:
          - "**/README.md"
          - "**/.swiftlint.yml"
    dependencies:
      - target: Permission
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tecorb.permission.uitests

schemes:
  Permission:
    build:
      targets:
        Permission: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PermissionTests
        - PermissionUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
