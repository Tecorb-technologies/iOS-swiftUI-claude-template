name: iOS CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test
    # macos-26 ships Xcode 26.5 (matches local Tecorb setup); default on this image is 26.5.
    runs-on: macos-26
    env:
      SCHEME: Permission
      DESTINATION: platform=iOS Simulator,name=iPhone 17 Pro
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26.5
        run: sudo xcode-select -s /Applications/Xcode_26.5.app/Contents/Developer

      - name: Install tools
        run: brew install xcodegen swiftlint swiftformat

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Format check
        run: swiftformat --lint .

      - name: Lint
        run: swiftlint lint --strict

      - name: Prepare simulators
        run: xcrun simctl list > /dev/null

      - name: Build & test
        run: |
          set -o pipefail
          # Prefer iPhone 17 Pro when available; otherwise first available iPhone.
          SIM_ID=$(xcrun simctl list devices available -j | python3 -c '
          import json, sys
          data = json.load(sys.stdin)
          preferred = None
          fallback = None
          for runtime, devices in data.get("devices", {}).items():
              if "iOS" not in runtime:
                  continue
              for device in devices:
                  if not device.get("isAvailable") or "iPhone" not in device.get("name", ""):
                      continue
                  if device["name"] == "iPhone 17 Pro" and preferred is None:
                      preferred = device["udid"]
                  elif fallback is None:
                      fallback = device["udid"]
          print(preferred or fallback or "")
          ')
          if [ -n "$SIM_ID" ]; then
            DESTINATION="platform=iOS Simulator,id=$SIM_ID"
          fi
          echo "Using destination: $DESTINATION"
          xcodebuild -version
          xcodebuild test \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
          if-no-files-found: ignore
